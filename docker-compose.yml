services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: chinese_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5002:5000"
    environment:
      # Points to the postgres service above.
      # To use your existing Neon cloud database instead, replace this with
      # your Neon connection string and remove the postgres service entirely.
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/chinese_learning
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}

volumes:
  postgres_data:
